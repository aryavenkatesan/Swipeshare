name: Integration Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'swipeshare_app/**'
      - 'firebase/**'
      - '.github/workflows/integration-tests.yml'

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: swipeshare_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      # Cache pub packages — keyed on pubspec.lock so it invalidates on any dependency change
      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('swipeshare_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache npm packages across both package-lock files
          cache: 'npm'
          cache-dependency-path: |
            firebase/package-lock.json
            firebase/functions/package-lock.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install firebase dependencies
        working-directory: firebase
        run: npm install

      - name: Install functions dependencies
        working-directory: firebase/functions
        run: npm install

      - name: Build functions
        working-directory: firebase/functions
        run: npm run build

      - name: Create firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Decode google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Get Flutter dependencies
        run: flutter pub get

      # Pre-download emulator binaries so they're available before start
      - name: Download emulator binaries
        working-directory: firebase
        run: firebase setup:emulators:firestore --project swipeshare-c24d1
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Start Firebase emulators
        working-directory: firebase
        run: firebase emulators:start --project swipeshare-c24d1 > /tmp/emulator.log 2>&1 &
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Wait for emulators to be ready
        run: npx wait-on tcp:9099 tcp:8080 tcp:5001 --timeout 120000

      - name: Print emulator log on failure
        if: failure()
        run: cat /tmp/emulator.log || true

      - name: Seed emulator users
        working-directory: firebase
        run: npm run seed

      # Cache the Android Virtual Device snapshot 
      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api33

      # Only runs on cache miss to create and snapshot the AVD for future runs
      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot created."

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: swipeshare_app
          script: flutter test integration_test/app_test.dart -d android --ignore-timeouts --reporter expanded 2>&1 | tee /tmp/flutter-test.log; exit ${PIPESTATUS[0]}

      - name: Print flutter test log
        if: always()
        run: cat /tmp/flutter-test.log || true
